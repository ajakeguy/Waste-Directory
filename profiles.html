<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hauler Profiles | Vermont Waste Directory</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
            color: white;
            padding: 1.5rem;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
        }
        
        .back-link {
            color: white;
            text-decoration: none;
            opacity: 0.9;
        }
        
        .back-link:hover {
            opacity: 1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }
        
        @media (max-width: 900px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card h2 {
            color: #1a472a;
            font-size: 1.125rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .company-header {
            margin-bottom: 1rem;
        }
        
        .company-name {
            font-size: 2rem;
            font-weight: 700;
            color: #1a472a;
            margin-bottom: 0.5rem;
        }
        
        .company-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            color: #666;
            font-size: 0.875rem;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-verified {
            background: #dcfce7;
            color: #166534;
        }
        
        .badge-bear {
            background: #ede9fe;
            color: #5b21b6;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table td {
            padding: 0.75rem 0;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .data-table td:first-child {
            width: 40%;
            color: #666;
            font-weight: 500;
        }
        
        .data-table td:last-child {
            color: #111;
        }
        
        .contact-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: #f9fafb;
            border-radius: 8px;
        }
        
        .contact-icon {
            width: 40px;
            height: 40px;
            background: #1a472a;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .contact-info {
            flex: 1;
        }
        
        .contact-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .contact-value {
            font-weight: 600;
            color: #111;
        }
        
        .waste-types-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .waste-type-card {
            padding: 1rem;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
        }
        
        .waste-type-card.active {
            border-color: #1a472a;
            background: #f0fdf4;
        }
        
        .waste-type-card.not-offered {
            opacity: 0.5;
        }
        
        .waste-type-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .waste-type-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .waste-type-desc {
            font-size: 0.875rem;
            color: #666;
        }
        
        #map {
            height: 300px;
            border-radius: 8px;
            margin-top: 1rem;
        }
        
        .placeholder-box {
            background: #f9fafb;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            color: #666;
        }
        
        .placeholder-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .placeholder-desc {
            font-size: 0.875rem;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #1a472a;
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            background: #2d5a3d;
        }
        
        .btn-secondary {
            background: white;
            color: #1a472a;
            border: 2px solid #1a472a;
        }
        
        .btn-secondary:hover {
            background: #f0fdf4;
        }
        
        .enrichment-note {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 0 8px 8px 0;
        }
        
        .enrichment-title {
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 0.25rem;
        }
        
        .enrichment-desc {
            font-size: 0.875rem;
            color: #3b82f6;
        }
        
        .tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: #e5e7eb;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="back-link">← Back to Directory</a>
            <h1>Hauler Profile</h1>
            <div></div>
        </div>
    </header>
    
    <div class="container">
        <div class="profile-grid">
            <div class="main-content" id="hauler-profile-main">
                <div class="card">
                    <div class="company-header">
                        <h1 class="company-name" id="profile-name">Loading...</h1>
                        <div class="company-meta">
                            <span class="badge badge-verified">✓ State Verified</span>
                            <span class="badge badge-bear" id="profile-bear" style="display:none;">🐻 Bear Resistant</span>
                        </div>
                    </div>
                    
                    <table class="data-table" id="profile-details">
                        <!-- Populated by JS -->
                    </table>
                </div>
                
                <div class="card">
                    <h2>🗑️ Services & Capabilities</h2>
                    <div class="waste-types-grid" id="waste-types">
                        <!-- Populated by JS -->
                    </div>
                </div>
                
                <div class="card">
                    <h2>📍 Service Area & Coverage</h2>
                    <div id="service-area-content">
                        <!-- Populated by JS -->
                    </div>
                    <div id="map"></div>
                </div>
                
                <div class="card">
                    <h2>🌐 Data Enrichment Previews</h2>
                    <div class="enrichment-note">
                        <div class="enrichment-title">🔍 Potential Websites</div>
                        <div class="enrichment-desc" id="profile-websites">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    <div class="enrichment-note" style="border-left-color: #10b981;">
                        <div class="enrichment-title">📊 Service Descriptions</div>
                        <div class="enrichment-desc" id="profile-types-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="sidebar" id="hauler-profile-sidebar">
                <div class="card">
                    <h2>📞 Contact Information</h2>
                    <div class="contact-section" id="contact-section">
                        <!-- Populated by JS -->
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" id="btn-call">📱 Call Now</button>
                        <button class="btn btn-secondary" id="btn-email">✉️ Send Email</button>
                        <button class="btn btn-secondary" id="btn-save">💾 Save to Favorites</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Parse URL parameter for hauler ID
        const urlParams = new URLSearchParams(window.location.search);
        const permitId = urlParams.get('id');
        
        let haulerData = null;
        let map;
        
        // Initialize map
        function initMap(lat = 44.0, lng = -72.7) {
            map = L.map('map').setView([lat, lng], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            L.marker([lat, lng]).addTo(map)
                .bindPopup('<b>' + escapeHtml(haulerData?.company || 'Location') + '</b>')
                .openPopup();
        }
        
        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Decode HTML entities
        function decodeHtml(html) {
            if (!html) return '';
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }
        
        // Render waste types
        function renderWasteTypes(types) {
            const wasteTypeData = {
                'S': { name: 'Solid Waste', icon: '🗑️', desc: 'General household & commercial waste', active: types.includes('S') },
                'H': { name: 'Hazardous Waste', icon: '☣️', desc: 'Chemicals, solvents, toxic materials', active: types.includes('H') },
                'R': { name: 'Recyclables', icon: '♻️', desc: 'Paper, plastic, metal, glass', active: types.includes('R') },
                'M': { name: 'Medical Waste', icon: '🏥', desc: 'Biohazards, sharps, clinical waste', active: types.includes('M') }
            };
            
            const container = document.getElementById('waste-types');
            container.innerHTML = Object.entries(wasteTypeData).map(([code, data]) => `
                <div class="waste-type-card ${data.active ? 'active' : 'not-offered'}">
                    <div class="waste-type-icon">${data.icon}</div>
                    <div class="waste-type-title">${data.name}</div>
                    <div class="waste-type-desc">${data.desc}</div>
                </div>
            `).join('');
        }
        
        // Load and display hauler
        async function loadHauler() {
            try {
                // Fetch the ENRICHED dataset!
                const response = await fetch('vermont_haulers_enriched.json');
                const haulers = await response.json();
                
                haulerData = haulers.find(h => h.permit_id === permitId);
                
                if (!haulerData) {
                    document.getElementById('hauler-profile-main').innerHTML = `
                        <div class="card">
                            <h2>Hauler Not Found</h2>
                            <p>No hauler found with permit ID: ${permitId}</p>
                            <a href="index.html">← Return to directory</a>
                        </div>
                    `;
                    return;
                }
                
                // Decode HTML entities in company name
                const decodedCompany = decodeHtml(haulerData.company);
                const decodedContact = decodeHtml(haulerData.contact);
                
                // Populate header
                document.getElementById('profile-name').textContent = decodedCompany;
                
                if (haulerData.bear_resistant.toLowerCase() === 'yes') {
                    document.getElementById('profile-bear').style.display = 'inline-flex';
                }
                
                // Populate details table
                const detailsTable = document.getElementById('profile-details');
                detailsTable.innerHTML = `
                    <tr>
                        <td>Permit ID</td>
                        <td><strong>${haulerData.permit_id}</strong> (Vermont DEC)</td>
                    </tr>
                    <tr>
                        <td>Contact Person</td>
                        <td>${decodedContact}</td>
                    </tr>
                    <tr>
                        <td>Geocoded Address</td>
                        <td>${escapeHtml(haulerData.geocoded_address || haulerData.address)}</td>
                    </tr>
                    <tr>
                        <td>City/Town</td>
                        <td>${escapeHtml(haulerData.town)}, ${haulerData.state}</td>
                    </tr>
                    <tr>
                        <td>Permit Year</td>
                        <td>${haulerData.permit_year}</td>
                    </tr>
                    <tr>
                        <td>Service Area</td>
                        <td>${haulerData.service_area !== '&nbsp;' ? escapeHtml(haulerData.service_area) : '<em>Statewide coverage</em>'}</td>
                    </tr>
                `;
                
                // Render waste types
                renderWasteTypes(haulerData.waste_types);
                
                // Populate websites preview
                if (haulerData.website_data && haulerData.website_data.possible_domains) {
                    document.getElementById('profile-websites').innerHTML = `
                        Possible domains discovered via patterns:<br>
                        ${haulerData.website_data.possible_domains.map(d => `<code style="display:inline-block;padding:2px 4px;background:#eee;margin:2px;">${d}</code>`).join(' ')}
                    `;
                }
                
                // Populate types list
                if (haulerData.waste_types_description) {
                    document.getElementById('profile-types-list').innerHTML = 
                        haulerData.waste_types_description.join(', ');
                }
                
                // Populate service area
                document.getElementById('service-area-content').innerHTML = `
                    <p><strong>Primary Location:</strong> ${escapeHtml(haulerData.town)}, ${haulerData.state}</p>
                    <p><strong>Geographic Context:</strong> ${escapeHtml(haulerData.geocoded_address)}</p>
                `;
                
                // Populate contact section
                const contactSection = document.getElementById('contact-section');
                contactSection.innerHTML = `
                    <div class="contact-item">
                        <div class="contact-icon">📞</div>
                        <div class="contact-info">
                            <div class="contact-label">Phone</div>
                            <div class="contact-value">${haulerData.phone_formatted || haulerData.phone}</div>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">👤</div>
                        <div class="contact-info">
                            <div class="contact-label">Contact</div>
                            <div class="contact-value">${decodedContact}</div>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">📍</div>
                        <div class="contact-info">
                            <div class="contact-label">Address</div>
                            <div class="contact-value">${escapeHtml(haulerData.address)}<br>${escapeHtml(haulerData.town)}, ${haulerData.state}</div>
                        </div>
                    </div>
                `;
                
                // Set up action buttons
                document.getElementById('btn-call').onclick = () => {
                    window.location.href = `tel:${haulerData.phone}`;
                };
                
                // Initialize map if we have coordinates
                if (haulerData.lat && haulerData.lng) {
                    initMap(haulerData.lat, haulerData.lng);
                } else {
                    document.getElementById('map').innerHTML = '<div class="no-results" style="padding:4rem;">Map location unavailable</div>';
                }
                
            } catch (e) {
                console.error('Error loading hauler:', e);
                document.getElementById('hauler-profile-main').innerHTML = `
                    <div class="card">
                        <h2>Error Loading Profile</h2>
                        <p>Could not load hauler data. Please try again.</p>
                        <p style="color: #666; font-size: 0.875rem;">${e.message}</p>
                    </div>
                `;
            }
        }
        
        // Load hauler on page load
        if (permitId) {
            loadHauler();
        } else {
            document.getElementById('hauler-profile-main').innerHTML = `
                <div class="card">
                    <h2>No Hauler Selected</h2>
                    <p>Please select a hauler from the <a href="index.html">directory</a>.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
